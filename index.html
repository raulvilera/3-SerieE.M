        * { margin: 0; padding: 0; box-sizing: border-box; }

            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0a4a36 0%, #0f7a55 100%);
            padding: 30px 35px;
            color: white;
        }

        .school-name {
            font-family: 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(255,255,255,0.15);
            padding: 18px 22px;
            border-radius: 20px;
            align-items: flex-end;
        }

        .info-field.field-nome   { flex: 1 1 260px; min-width: 200px; }
        .info-field.field-numero { flex: 0 0 70px; width: 70px; }
        .info-field.field-serie  { flex: 0 0 150px; width: 150px; }
        .info-field.field-data   { flex: 0 0 150px; width: 150px; }

        .info-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;
        }

        .info-field label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.85;
            white-space: nowrap;
        }

        .info-field input, .info-field select {
            background: white;
            border: none;
            padding: 9px 12px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            outline: none;
            font-family: inherit;
            width: 100%;
            min-width: 0;
        }

        .info-field.field-numero input,
        .info-field.field-data input { text-align: center; }

        .info-field input[readonly] {
            background: #eef2ff;
            color: #3730a3;
        }

        .activity-title {
            font-family: 'Nunito', sans-serif;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        .content { padding: 30px 35px; background: #f8fafc; }

        .question-card {
            background: white;
            border-radius: 24px;
            margin-bottom: 32px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            border: 1px solid #e2e8f0;
            transition: box-shadow 0.2s;
        }

        .question-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.11); }

        .question-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 24px 12px;
            flex-wrap: wrap;
        }

        .question-number {
            background: linear-gradient(135deg, #0a4a36, #0f7a55);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .question-tag {
            font-size: 0.72rem;
            font-weight: 700;
            color: #0a4a36;
            background: #d1fae5;
            padding: 5px 14px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .question-body { padding: 0 24px 24px; }

        .question-text {
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 18px 22px;
            border-radius: 16px;
            border-left: 6px solid #0f7a55;
        }

        .question-image-container {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .question-image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .alternatives-list { display: flex; flex-direction: column; gap: 12px; }

        .alternative-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: #f8fafc;
            padding: 14px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1.5px solid #e2e8f0;
        }

        .alternative-item:hover { background: #eff6ff; border-color: #93c5fd; transform: translateX(5px); }

        .alternative-item.selected {
            background: #1f7a5a;
            border-color: #0a4a36;
            transform: translateY(1px);
        }

        .alternative-item.selected .alternative-text { color: white; }

        .alternative-item input[type="radio"] {
            margin-top: 3px; width: 18px; height: 18px;
            cursor: pointer; accent-color: #1f7a5a; flex-shrink: 0;
        }

        .alternative-text { font-size: 0.95rem; font-weight: 600; color: #1e293b; line-height: 1.4; flex: 1; }

        .submit-area { margin-top: 40px; text-align: center; padding: 20px 0 10px; }

        .btn-submit {
            background: linear-gradient(135deg, #1f7a5a, #0a4a36);
            border: none; padding: 18px 56px;
            font-size: 1.2rem; font-family: 'Nunito', sans-serif;
            font-weight: 800; color: white; border-radius: 60px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(31,122,90,0.3);
        }

        .btn-submit:hover { transform: scale(0.98); box-shadow: 0 4px 10px rgba(31,122,90,0.4); }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

        .status-message { margin-top: 20px; padding: 14px 20px; border-radius: 16px; font-weight: 600; display: none; }
        .status-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; display: block; }
        .status-error   { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; display: block; }

        .loading-spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid white; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            margin-left: 10px; vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            background: #f1f5f9; padding: 20px 35px; text-align: center;
            font-size: 0.75rem; color: #64748b; border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .content { padding: 16px; }
            .question-body { padding: 0 16px 20px; }
            .question-header { padding: 20px 16px 10px; }
            .alternative-item { padding: 12px 16px; border-radius: 40px; }
        }
    </style>
</head>

function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    let html = '';

    questoes.forEach((q, idx) => {
        html += `
            <div class="question-card" data-qidx="${idx}">
                <div class="question-header">
                    <span class="question-number">QUESTÃO ${idx + 1}</span>
                    <span class="question-tag">${q.tag}</span>
                </div>
                <div class="question-body">
                    <div class="question-text">${q.text}</div>
                    <div class="question-image-container">
                        <img src="${q.imageUrl}" alt="Ilustração Questão ${idx + 1}">
                    </div>
                    <div class="alternatives-list">
                        ${q.options.map((opt, optIdx) => `
                            <div class="alternative-item" data-q="${idx}" data-val="${optIdx}">
                                <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_opt${optIdx}">
                                <span class="alternative-text">${String.fromCharCode(65 + optIdx)}. ${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
    });

    container.innerHTML = html;

    document.querySelectorAll('.alternative-item').forEach(item => {
        const radio = item.querySelector('input[type="radio"]');
        item.addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT') radio.checked = true;
            item.closest('.question-card').querySelectorAll('.alternative-item')
                .forEach(a => a.classList.remove('selected'));
            item.classList.add('selected');
        });
        radio.addEventListener('change', () => {
            if (radio.checked) {
                item.closest('.question-card').querySelectorAll('.alternative-item')
                    .forEach(a => a.classList.remove('selected'));
                item.classList.add('selected');
            }
        });
    });
}

renderQuestions();

let switchCount = 0;
document.addEventListener('visibilitychange', () => {
    if (document.hidden) switchCount++;
});

function getRespostas() {
    return questoes.map((_, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        return sel ? String.fromCharCode(65 + parseInt(sel.value)) : '';
    });
}

function showMessage(message, isSuccess) {
    const msgDiv = document.getElementById('statusMessage');
    msgDiv.textContent = message;
    msgDiv.className = `status-message ${isSuccess ? 'status-success' : 'status-error'}`;
    setTimeout(() => { msgDiv.className = 'status-message'; }, 6000);
}

async function enviarRespostas() {
    const aluno  = alunoSelect.value;
    const numero = document.getElementById('numeroChamada').value;
    const serie  = document.getElementById('serieInput').value;
    const data   = dataInput.value;

    if (!aluno) { showMessage('❌ Selecione o nome do aluno antes de enviar.', false); return; }

    const respostas = getRespostas();
    const gabarito = questoes.map(q => String.fromCharCode(65 + q.correct));
    let acertos = 0;
    respostas.forEach((r, i) => { if (r && r === gabarito[i]) acertos++; });

    const payload = {
        school: SCHOOL_CODE,
        studentName: aluno,
        studentNumber: numero,
        studentGrade: serie,
        date: data,
        switchCount: switchCount
    };
    respostas.forEach((r, i) => { payload['q' + (i + 1)] = r; });

    const btn = document.getElementById('enviarBtn');
    btn.disabled = true;
    btn.innerHTML = '📤 ENVIANDO... <span class="loading-spinner"></span>';

    try {
        await fetch(WEB_APP_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        showMessage(`✅ Respostas registradas! ${aluno} (Nº ${numero}) | Acertos: ${acertos}/${questoes.length}`, true);
    } catch (error) {
        showMessage('❌ Erro ao enviar. Verifique sua conexão.', false);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 ENVIAR RESPOSTAS';
    }
}

document.getElementById('enviarBtn').addEventListener('click', enviarRespostas);
</script>
</body>
